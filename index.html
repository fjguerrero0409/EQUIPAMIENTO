<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Checklist Consultorios – Producción</title>
<style>
  :root{color-scheme:light dark;--bg:#fff;--fg:#111827;--muted:#6b7280;--primary:#2563eb;--border:#e5e7eb;--cat:#f3f4f6}
  *{box-sizing:border-box}
  body{margin:0;padding:16px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--fg)}
  h1{margin:0 0 10px;font-size:1.35rem}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);max-width:1280px;margin:0 auto 14px}
  .row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
  label.small{font-size:.92rem;color:var(--muted)}
  input,select,button,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff}
  button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .spacer{flex:1}
  .accordion{border:1px solid var(--border);border-radius:10px;overflow:hidden}
  details{border-bottom:1px solid var(--border)}
  details:last-child{border-bottom:none}
  summary{list-style:none;cursor:pointer;padding:12px 14px;background:var(--cat);font-weight:600}
  summary::-webkit-details-marker{display:none}
  .table{overflow:auto}
  table{width:100%;border-collapse:collapse}
  th,td{padding:8px;border-bottom:1px solid var(--border);vertical-align:top}
  thead th{position:sticky;top:0;background:#f9fafb}
  .obs{width:100%;min-height:30px;resize:vertical}
  .qty{width:120px}
  .right{display:flex;gap:8px;align-items:center}
  .hint{color:var(--muted);font-size:.9rem}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:.8rem}
</style>
</head>
<body>
<div class="card">
  <h1>Registro de Consultorios <span id="status" class="hint"></span></h1>
  <div class="row">
    <div>
      <label class="small">Fecha</label><br>
      <input id="fecha" type="date" required>
    </div>
    <div>
      <label class="small">Turno</label><br>
      <select id="turno"><option>AM</option><option>PM</option></select>
    </div>
    <div>
      <label class="small">Persona</label><br>
      <select id="persona"></select>
    </div>
    <div>
      <label class="small">Centro Médico</label><br>
      <select id="centro"></select>
    </div>
    <div>
      <label class="small">Especialidad</label><br>
      <select id="especialidad"></select>
    </div>
    <div>
      <label class="small">¿Es primer ingreso?</label><br>
      <select id="primerIngreso"><option value="no">No</option><option value="si">Sí</option></select>
    </div>
    <div class="spacer"></div>
    <div class="right">
      <span id="modoBadge" class="badge">Modo: Completo</span>
      <button id="guardarBtn" class="primary">💾 Guardar envío</button>
    </div>
  </div>
  <div class="hint">Si <b>Es primer ingreso = Sí</b> y la especialidad es <b>crítica</b> (Dermatología, Ginecología, Ecografía), se muestra solo <b>Reposición de insumos</b>. En caso contrario, verás todas las categorías.</div>
</div>

<div class="card">
  <div class="accordion" id="acordeon"></div>
</div>

<div class="card">
  <h2 style="margin:0 0 8px">Historial local</h2>
  <div class="row">
    <button id="exportCsvBtn">⬇️ Exportar CSV</button>
    <button id="exportJsonBtn">⬇️ Exportar JSON</button>
    <div class="spacer"></div>
    <button id="refreshBtn">🔄 Actualizar</button>
    <button id="clearBtn">🗑️ Borrar historial</button>
  </div>
  <div id="history"></div>
</div>

const PERSONAS = ["Josue", "Maria"];
const CENTROS = ["CM AMAZONAS", "CM CALDERÓN", "CM CARCELÉN", "CM CONDADO", "CM CAROLINA", "CM CUMBAYA", "CM CHILLOS", "CM QUICENTRO SUR", "CM ALBORADA", "CM KENNEDY", "CM CIUDAD CELESTE"];
const CATEGORIAS_ORDEN = ['Desinfección','Funcionamiento','Revisión','Reposición insumos/dispositivos'];
const ESPECIALIDADES_CRITICAS = ['Dermatología','Ginecología','Ecografía'];

// =================== ESTADO ===================
const STORAGE_SUBMISSIONS = 'consultorios_submissions_prod_v1';
let submissions = JSON.parse(localStorage.getItem(STORAGE_SUBMISSIONS)||'[]');

const $ = s=>document.querySelector(s);
const $$ = s=>Array.from(document.querySelectorAll(s));
const uuid = ()=> crypto.randomUUID?.() || ('id-'+Date.now()+'-'+Math.random().toString(16).slice(2));

function setBadge(modo){ $('#modoBadge').textContent = 'Modo: '+(modo==='reposicion'?'Reposición':'Completo'); }
function isCritica(esp){ return ESPECIALIDADES_CRITICAS.includes(esp); }

function init(){
  $('#status').textContent = `Especialidades: ${Object.keys(DATA||{}).length}`;
  $('#fecha').value = new Date().toISOString().slice(0,10);
  $('#persona').innerHTML = PERSONAS.map(p=>`<option value="${p}">${p}</option>`).join('');
  $('#centro').innerHTML = CENTROS.map(c=>`<option value="${c}">${c}</option>`).join('');
  const espSel = $('#especialidad'); espSel.innerHTML = Object.keys(DATA||{}).map(e=>`<option value="${e}">${e}</option>`).join('');
  if(espSel.options.length>0) espSel.selectedIndex=0;
  ['especialidad','turno','fecha','persona','centro','primerIngreso'].forEach(id=>{ $('#'+id).addEventListener('change', renderSecciones); });
  renderSecciones();
}

function renderSecciones(){
  const esp = $('#especialidad').value; const primer = $('#primerIngreso').value; let modo='completo';
  if(primer==='si' && isCritica(esp)) modo='reposicion'; setBadge(modo);
  const items = DATA[esp]||[]; const porCat={}; items.forEach(it=>{ const c=it.category||'General'; (porCat[c]=porCat[c]||[]).push(it.item); });
  const ordenar = CATEGORIAS_ORDEN.filter(c=>porCat[c]);
  const mostrar = (modo==='reposicion')? ordenar.filter(c=>c.toLowerCase().startsWith('reposicion')) : ordenar;
  const cont = document.getElementById('acordeon'); cont.innerHTML='';
  if(mostrar.length===0){ cont.innerHTML = '<div class="hint">No hay ítems para esta especialidad.</div>'; return; }
  mostrar.forEach(cat=>{
    const det=document.createElement('details'); det.open=(modo==='reposicion');
    const sum=document.createElement('summary'); sum.textContent=cat; det.appendChild(sum);
    const wrap=document.createElement('div'); wrap.className='table';
    const tbl=document.createElement('table'); const thead=document.createElement('thead'); const trh=document.createElement('tr');
    if(cat.toLowerCase().startsWith('reposicion')) trh.innerHTML='<th style="width:48px">#</th><th>Ítem</th><th style="width:90px">Check</th><th style="width:120px">Cantidad</th><th>Observación</th>'; else trh.innerHTML='<th style="width:48px">#</th><th>Ítem</th><th style="width:90px">Check</th><th>Observación</th>';
    thead.appendChild(trh); tbl.appendChild(thead); const tbody=document.createElement('tbody');
    (porCat[cat]||[]).forEach((nombre,i)=>{
      const tr=document.createElement('tr');
      if(cat.toLowerCase().startsWith('reposicion')){
        tr.innerHTML=`<td>${i+1}</td><td>${escapeHtml(nombre)}</td><td style="text-align:center"><input type=\"checkbox\" data-role=\"check\" data-cat=\"${escapeAttr(cat)}\" data-item=\"${escapeAttr(nombre)}\"></td><td><input type=\"number\" class=\"qty\" min=\"1\" step=\"1\" placeholder=\"0\" data-role=\"qty\" data-cat=\"${escapeAttr(cat)}\" data-item=\"${escapeAttr(nombre)}\" disabled></td><td><textarea class=\"obs\" placeholder=\"Observación...\" data-role=\"obs\" data-cat=\"${escapeAttr(cat)}\" data-item=\"${escapeAttr(nombre)}\"></textarea></td>`;
      } else {
        tr.innerHTML=`<td>${i+1}</td><td>${escapeHtml(nombre)}</td><td style=\"text-align:center\"><input type=\"checkbox\" data-role=\"check\" data-cat=\"${escapeAttr(cat)}\" data-item=\"${escapeAttr(nombre)}\"></td><td><textarea class=\"obs\" placeholder=\"Observación...\" data-role=\"obs\" data-cat=\"${escapeAttr(cat)}\" data-item=\"${escapeAttr(nombre)}\"></textarea></td>`;
      }
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody); wrap.appendChild(tbl); det.appendChild(wrap); cont.appendChild(det);
  });

  cont.addEventListener('change', (e)=>{
    if(e.target && e.target.matches('input[type="checkbox"][data-role="check"]')){
      const tr=e.target.closest('tr'); const qty=tr && tr.querySelector('input[data-role="qty"]'); if(qty){ qty.disabled=!e.target.checked; if(e.target.checked && !qty.value) qty.value=1; if(!e.target.checked) qty.value=''; }
    }
  }, {once:true});
}

function escapeHtml(s){ return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function escapeAttr(s){ return String(s||'').replaceAll('"','&quot;'); }

function recolectar(){ const meta={ submissionId: uuid(), createdAt: new Date().toISOString(), fecha: $('#fecha').value, turno: $('#turno').value, persona: $('#persona').value, centro: $('#centro').value, especialidad: $('#especialidad').value, primerIngreso: $('#primerIngreso').value }; const items=[]; $$('#acordeon tr').forEach(tr=>{ const chk=tr.querySelector('input[type="checkbox"][data-role="check"]'); if(!chk) return; const cat=chk.getAttribute('data-cat'); const item=chk.getAttribute('data-item'); const obs=(tr.querySelector('textarea[data-role="obs"]').value||''); const qtyEl=tr.querySelector('input[data-role="qty"]'); const qty=qtyEl ? (qtyEl.value? Number(qtyEl.value) : null) : null; if(qtyEl && chk.checked && (!qty || qty<1)) throw new Error('Cantidad requerida en Reposición para: '+item); items.push({category:cat,item:item,checked:!!chk.checked,quantity:qty,observation:obs}); }); return {meta, items}; }
function guardar(){ try{ const payload=recolectar(); submissions.push(payload); localStorage.setItem(STORAGE_SUBMISSIONS, JSON.stringify(submissions)); renderHistorial(); alert('✅ Envío guardado');
  if(window.ENABLE_REMOTE_POST){ fetch(window.REMOTE_ENDPOINT, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)}) .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); }).then(()=>console.log('Enviado a Power Automate')).catch(err=>{ console.error(err); alert('⚠️ No se pudo enviar al repositorio (ver consola)'); }); }
} catch(err){ alert('❌ '+err.message); } }

function aplanarFila(p){ const b=p.meta; const rows=[]; p.items.forEach((it,i)=>{ rows.push({ submissionId:b.submissionId, createdAt:b.createdAt, fecha:b.fecha, turno:b.turno, persona:b.persona, centro:b.centro, especialidad:b.especialidad, primerIngreso:b.primerIngreso, index:i+1, category:it.category, item:it.item, checked:it.checked? 'TRUE':'FALSE', quantity:(it.quantity==null?'':it.quantity), observation:it.observation||'' });}); return rows; }
function toCSV(rows){ const headers=Object.keys(rows[0]||{submissionId:'',createdAt:'',fecha:'',turno:'',persona:'',centro:'',especialidad:'',primerIngreso:'',index:'',category:'',item:'',checked:'',quantity:'',observation:''}); const esc=v=>'"'+String(v).replaceAll('"','""')+'"'; const out=[headers.join(',')]; rows.forEach(r=>out.push(headers.map(h=>esc(r[h]??'')).join(','))); return out.join('\r\n'); }
function descargar(content, name, type){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url); }

function renderHistorial(){ const cont=document.getElementById('history'); cont.innerHTML=''; if(!submissions.length){ cont.innerHTML='<p class="hint">Sin envíos.</p>'; return;} submissions.slice().reverse().forEach(p=>{ const div=document.createElement('div'); div.style.border='1px solid var(--border)'; div.style.borderRadius='8px'; div.style.padding='8px'; div.style.marginBottom='8px'; div.innerHTML=`<div style=\"display:flex;justify-content:space-between;gap:8px;align-items:center;\"><div><strong>${escapeHtml(p.meta.especialidad)}</strong> · ${escapeHtml(p.meta.centro)} · ${escapeHtml(p.meta.persona)}<div class=\"hint\">${new Date(p.meta.createdAt).toLocaleString()} · ${p.meta.fecha} ${p.meta.turno} · Primer ingreso: ${p.meta.primerIngreso.toUpperCase()}</div></div><div><button data-action=\"ver\" data-id=\"${p.meta.submissionId}\">Ver</button> <button data-action=\"del\" data-id=\"${p.meta.submissionId}\">Eliminar</button></div></div>`; cont.appendChild(div); }); cont.onclick=(e)=>{ const b=e.target.closest('button'); if(!b) return; const id=b.getAttribute('data-id'); const act=b.getAttribute('data-action'); if(act==='del'){ if(!confirm('¿Eliminar este envío?')) return; submissions=submissions.filter(x=>x.meta.submissionId!==id); localStorage.setItem(STORAGE_SUBMISSIONS, JSON.stringify(submissions)); renderHistorial(); } else if(act==='ver'){ const p=submissions.find(x=>x.meta.submissionId===id); if(!p) return; const lines=[`Fecha: ${p.meta.fecha} ${p.meta.turno}`,`Persona: ${p.meta.persona}`,`Centro: ${p.meta.centro}`,`Especialidad: ${p.meta.especialidad}`,`Primer ingreso: ${p.meta.primerIngreso}`, 'Items:', ...p.items.map((it,i)=>`  ${i+1}. [${it.checked?'X':' '}] ${it.category} – ${it.item} ${it.quantity?('· Qty: '+it.quantity):''} | ${it.observation||''}`)]; alert(lines.join('\n')); } } }

window.addEventListener('DOMContentLoaded', ()=>{ init(); renderHistorial(); });
document.addEventListener('click', (e)=>{
  if(e.target && e.target.id==='guardarBtn') guardar();
  if(e.target && e.target.id==='refreshBtn') renderHistorial();
  if(e.target && e.target.id==='clearBtn'){ if(confirm('¿Borrar TODO el historial?')){ submissions=[]; localStorage.setItem(STORAGE_SUBMISSIONS,'[]'); renderHistorial(); }}
  if(e.target && e.target.id==='exportCsvBtn'){ const rows=submissions.flatMap(aplanarFila); if(!rows.length) return alert('No hay envíos.'); descargar(toCSV(rows),'envios_consultorios.csv','text/csv'); }
  if(e.target && e.target.id==='exportJsonBtn'){ descargar(JSON.stringify(submissions,null,2),'envios_consultorios.json','application/json'); }
});

window.ENABLE_REMOTE_POST = true; // Cambia a true y coloca tu URL abajo
window.REMOTE_ENDPOINT = 'https://default480bd49c6f894faab39ec7728d95d1.30.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9cb4139a906e44dbaf034ca1b52de512/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=7UeFYn4gGQexDGtFYSIVDusxzpWSd4ROFQD1iRoz_ME';
